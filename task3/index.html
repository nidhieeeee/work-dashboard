<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToodleDo</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
        body { 
            font-family: 'Space Grotesk', sans-serif;
            background-image: radial-gradient(circle at 2px 2px, #1e2124 1px, transparent 0);
            background-size: 40px 40px;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

  <nav class="flex justify-between px-10 py-5 bg-zinc-900/50 shadow items-center">
    <h1 class="text-3xl font-bold text-white">ToodleDo</h1>
    <div class="gap-6 text-lg hidden md:flex">
      <button onclick="filterTasks('all')">All</button>
      <button onclick="filterTasks('completed')">Completed</button>
      <button onclick="filterTasks('pending')">Pending</button>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto mt-10 bg-zinc-900/50 p-6 rounded-lg shadow">

    <div class="flex gap-3">
      <input id="taskInput" type="text" placeholder="Enter a task..."
        class="flex-1 border border-white text-white rounded px-4 py-2 ">
      <button onclick="addTask()"
        class="bg-white text-black px-6 rounded-lg hover:bg-slate-100 cursor-pointer hover:scale-110">Add</button>
    </div>

    <div id="taskList" class="mt-6 space-y-3"></div>

  </main>
<script src="script.js"></script>

</body>
</html>
