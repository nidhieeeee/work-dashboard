<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Product Table</title>
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif;
            background-image: radial-gradient(circle at 2px 2px, #1e2124 1px, transparent 0);
            background-size: 40px 40px;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Product Inventory</h1>

        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search products..." 
                class="border p-2 rounded w-full md:w-1/2 focus:ring-2 focus:ring-blue-400 outline-none"
            >
            
            <select id="categoryFilter" class="border p-2 rounded w-full md:w-1/4">
                <option value="all">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
                <option value="Accessories">Accessories</option>
            </select>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200 text-gray-700">
                        <th class="p-3 border-b cursor-pointer hover:bg-gray-300" onclick="handleSort('name')">
                            Product Name <span id="sort-name">↕</span>
                        </th>
                        <th class="p-3 border-b">Category</th>
                        <th class="p-3 border-b cursor-pointer hover:bg-gray-300" onclick="handleSort('price')">
                            Price <span id="sort-price">↕</span>
                        </th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
