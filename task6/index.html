 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="flex px-8 py-4 bg-gray-800 text-white items-center justify-between shadow-lg">
        <h1 class="text-2xl font-bold tracking-tight">CRUD Operations</h1>
        <ul class="flex gap-8 font-medium">
            <li><button onclick="switchView('list')" id="navHome" class="border-b-2 border-white pb-1">Home</button></li>
            <li><button onclick="switchView('form')" id="navAdd" class="hover:text-gray-300 transition">Add User</button></li>
        </ul>
    </nav>

    <main id="listView" class="p-6 md:p-12 max-w-7xl mx-auto">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-8 text-center">User Directory</h2>

        <div class="bg-white p-6 rounded-t-2xl border border-slate-200 shadow-sm flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-sm font-semibold mb-1">Search</label>
                <input type="text" id="searchInput" placeholder="Name or Email..."
                    class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-sm font-semibold mb-1">Country</label>
                <select id="filterCountry" class="w-full border p-2 rounded-lg">
                    <option value="">All Countries</option>
                </select>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-sm font-semibold mb-1">City</label>
                <select id="filterCity" class="w-full border p-2 rounded-lg">
                    <option value="">All Cities</option>
                </select>
            </div>
        </div>

        <div class="w-full bg-white shadow-xl rounded-b-2xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-600 text-white">
                        <tr>
                            <th class="p-5 text-sm font-bold uppercase tracking-wider">Name</th>
                            <th class="p-5 text-sm font-bold uppercase tracking-wider">Email</th>
                            <th class="p-5 text-sm font-bold uppercase tracking-wider">Phone</th>
                            <th class="p-5 text-sm font-bold uppercase tracking-wider">Gender</th>
                            <th class="p-5 text-sm font-bold uppercase tracking-wider">Bio</th>
                            <th class="p-5 text-sm font-bold uppercase tracking-wider">Location</th>
                            <th class="p-5 text-sm font-bold uppercase tracking-wider">Operations</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>

            <div class="p-4 bg-slate-50 border-t flex justify-between items-center">
                <span id="pageInfo" class="text-sm font-medium text-slate-600">Showing page 1</span>
                <div class="flex gap-2">
                    <button id="prevBtn" class="px-4 py-2 bg-white border rounded hover:bg-gray-100 disabled:opacity-50">Prev</button>
                    <button id="nextBtn" class="px-4 py-2 bg-white border rounded hover:bg-gray-100 disabled:opacity-50">Next</button>
                </div>
            </div>
        </div>
    </main>

    <main id="formView" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-2xl bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
            <div class="bg-gray-600 p-8 text-white">
                <h1 id="formHeading" class="text-3xl font-bold">Add New User</h1>
                <p class="text-indigo-100 mt-2">Fill in the details below to manage the profile.</p>
            </div>

            <form id="userForm" class="p-8 space-y-10">
                <input type="hidden" id="userId" name="id">
                <section>
                    <div class="flex items-center gap-2 mb-6 border-b border-slate-100 pb-2">
                        <div class="h-8 w-1 bg-gray-600 rounded-full"></div>
                        <h2 class="text-xl font-semibold text-slate-800">Personal Information</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2">
                            <label for="name" class="text-sm font-medium text-slate-700">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="John Doe" class="px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-gray-500 outline-none" required>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label for="email" class="text-sm font-medium text-slate-700">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="user@example.com" class="px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-gray-500 outline-none" required>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label for="phone" class="text-sm font-medium text-slate-700">Mobile Number</label>
                            <input type="number" id="phone" name="phone" placeholder="10 digit number" class="px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-gray-500 outline-none" required>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium text-slate-700">Gender</label>
                            <div class="flex items-center gap-4 py-2">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="gender" value="male" required> <span class="text-sm">Male</span></label>
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="gender" value="female"> <span class="text-sm">Female</span></label>
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="gender" value="other"> <span class="text-sm">Other</span></label>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2 md:col-span-2">
                            <label for="bio" class="text-sm font-medium text-slate-700">Bio</label>
                            <textarea id="bio" name="bio" rows="3" placeholder="Tell us about yourself..." class="px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-gray-500 outline-none"></textarea>
                        </div>
                    </div>
                </section>

                <section>
                    <div class="flex items-center gap-2 mb-6 border-b border-slate-100 pb-2">
                        <div class="h-8 w-1 bg-gray-600 rounded-full"></div>
                        <h2 class="text-xl font-semibold text-slate-800">Address Details</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium text-slate-700">Country</label>
                            <input type="text" name="contry" id="contry" class="px-4 py-2 border rounded-lg" required>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium text-slate-700">State</label>
                            <input type="text" name="state" id="state" class="px-4 py-2 border rounded-lg" required>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium text-slate-700">City</label>
                            <input type="text" name="city" id="city" class="px-4 py-2 border rounded-lg" required>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-medium text-slate-700">Pin Code</label>
                            <input type="number" name="pincode" id="pincode" class="px-4 py-2 border rounded-lg" required>
                        </div>
                    </div>
                </section>

                <div class="flex items-center justify-end gap-4 pt-6">
                    <button type="button" onclick="switchView('list')" class="px-6 py-2 text-sm font-semibold text-slate-600">Cancel</button>
                    <button type="submit" id="submitBtn" class="px-8 py-2 bg-gray-600 hover:bg-gray-700 text-white font-bold rounded-lg shadow-lg transition-all">Save User</button>
                </div>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
