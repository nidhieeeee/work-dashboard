<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timekeeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body class=" text-zinc-100 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full space-y-6">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-bold tracking-tight text-black">Clock</h1>
        </header>

        <section class="bg-zinc-900/50 border border-zinc-800 p-6 rounded-3xl text-center shadow-2xl">
            <span class="text-xs font-semibold text-black uppercase tracking-widest">Current Time</span>
            <div id="clock" class="text-6xl mono font-medium text-white mt-2">00:00:00</div>
        </section>

        <div class="grid grid-cols-1 gap-6">
            <section class="bg-zinc-900/50 border border-zinc-800 p-6 rounded-3xl shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-semibold text-black uppercase tracking-widest">Stopwatch</span>
                    <div id="stopwatch-display" class="text-3xl mono text-white">00:00:00</div>
                </div>
                <div class="flex gap-3">
                    <button onclick="startStopwatch()"
                        class="flex-1 bg-zinc-100 text-zinc-950 py-3 rounded-2xl font-bold hover:bg-white transition-all active:scale-95">Start</button>
                    <button onclick="stopStopwatch()"
                        class="flex-1 bg-zinc-800 text-white py-3 rounded-2xl font-bold hover:bg-zinc-700 transition-all active:scale-95">Stop</button>
                    <button onclick="resetStopwatch()"
                        class="px-4 bg-zinc-800 text-white py-3 rounded-2xl hover:text-rose-400 transition-colors">
                        Reset
                    </button>
                </div>
            </section>


            <section class="bg-zinc-900/50 border border-zinc-800 p-6 rounded-3xl shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-semibold text-black uppercase tracking-widest">Countdown</span>
                    <div id="timer-display" class="text-3xl mono text-white">00:00</div>
                </div>
                <div class="flex gap-3">
                    <input type="number" id="timer-input" placeholder="Secs"
                        class="w-24 bg-zinc-800 border-none rounded-2xl px-4 py-3 text-center focus:ring-2 text-white  outline-none">
                    <button onclick="startTimer()"
                        class="flex-1 bg-white text-black py-3 rounded-2xl font-bold hover:bg-orange-500 transition-all active:scale-95 shadow-lg shadow-orange-900/20">
                        Set Timer
                    </button>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
