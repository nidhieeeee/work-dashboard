<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Validator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Create Account</h2>

        <form id="registrationForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe" autocomplete="off"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 transition-all">
                <span id="nameError" class="text-[11px] text-red-500 mt-1 hidden font-medium">
                    Name must be at least 3 letters. (Numbers are not allowed)
                </span>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 transition-all">
                <span id="emailError" class="text-xs text-red-500 mt-1 hidden">Please enter a valid email
                    address.</span>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" placeholder="••••••••°•"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 transition-all">

                <ul id="passwordRequirements" class="text-xs mt-2 space-y-1">
                    <li id="reqLength" class="text-gray-500">• Minimum 8 characters</li>
                    <li id="reqUpper" class="text-gray-500">• At least one uppercase letter</li>
                    <li id="reqSpecial" class="text-gray-500">• At least one special character</li>
                </ul>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 transition-all">
                <span id="confirmError" class="text-xs text-red-500 mt-1 hidden">Passwords do not match.</span>
            </div>

            <button type="submit" id="submitBtn" disabled
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md font-semibold hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors mt-4">
                Sign Up
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
